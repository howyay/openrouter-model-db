services:
  superset:
    image: apache/superset:latest
    container_name: superset
    user: root
    network_mode: host
    volumes:
      - ./data:/data
      - ./superset/superset-init.sh:/superset-init.sh
      - superset_home:/app/superset_home
    environment:
      SUPERSET_SECRET_KEY: "openrouter-model-db-superset-dev-key-change-me"
      TALISMAN_ENABLED: "False"
    entrypoint: ["/bin/bash", "/superset-init.sh"]

volumes:
  superset_home:
